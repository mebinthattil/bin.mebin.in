services:
  bin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pastebin
    ports:
      - "8820:8820"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8820"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s